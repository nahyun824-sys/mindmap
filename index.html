<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MindTrip</title>
<meta name="theme-color" content="#f6f7f9" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0e0f13" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MindTrip">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root{
    --bg:#f6f7f9; --panel:#ffffff; --line:#eceef3; --text:#181b22; --sub:#878d99;
    --accent:#5b5bd6; --accent-soft:#eeeefc; --danger:#e5484d; --danger-soft:#fdebec;
    --field:#f1f2f6; --dot:#e3e6ec;
    --shadow:0 1px 2px rgba(24,27,34,.04), 0 6px 20px rgba(24,27,34,.05);
    --shadow-lg:0 8px 40px rgba(24,27,34,.16);
    --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0e0f13; --panel:#191b21; --line:#272a33; --text:#eef0f4; --sub:#858b98;
      --accent:#7b7ef4; --accent-soft:rgba(123,126,244,.15); --danger:#f2555a; --danger-soft:rgba(242,85,90,.14);
      --field:#22242d; --dot:#1e2027;
      --shadow:0 1px 2px rgba(0,0,0,.2), 0 6px 20px rgba(0,0,0,.25);
      --shadow-lg:0 8px 40px rgba(0,0,0,.5);
    }
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; overscroll-behavior:none;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    background:var(--bg); color:var(--text); overflow:hidden; position:fixed; inset:0;
    user-select:none; -webkit-user-select:none;
    -webkit-font-smoothing:antialiased; letter-spacing:-.01em;
  }
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; font-size:14px;}
  svg{display:block; flex:0 0 auto;}
  input,select,textarea{
    font-family:inherit; font-size:16px; border:1.5px solid transparent; border-radius:12px;
    padding:12px 14px; background:var(--field); color:var(--text); outline:none; width:100%;
    -webkit-user-select:text; user-select:text; transition:border-color .15s, background .15s;
    -webkit-appearance:none; appearance:none;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--accent); background:var(--panel);}
  ::placeholder{color:var(--sub);}

  .screen{position:absolute; inset:0; display:none; flex-direction:column;}
  .screen.active{display:flex;}
  .icon-btn{
    width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center;
    color:var(--sub); transition:background .15s;
  }
  .icon-btn:active{background:var(--field); color:var(--text);}

  /* ═══ 홈 ═══ */
  .home-head{
    padding:calc(18px + var(--sat)) 20px 6px; display:flex; align-items:center; gap:8px;
  }
  .logo{font-size:24px; font-weight:800; letter-spacing:-.03em; flex:1;}
  .logo span{color:var(--accent);}
  .search-row{display:flex; gap:8px; padding:8px 16px 10px;}
  .search-box{
    flex:1; display:flex; align-items:center; gap:9px; background:var(--field);
    border-radius:13px; padding:0 14px; color:var(--sub);
  }
  .search-box input{background:none; border:none; padding:12px 0; border-radius:0; font-size:15px;}
  .search-box input:focus{background:none;}
  .chip-btn{
    display:flex; align-items:center; gap:6px; padding:0 15px; border-radius:13px;
    background:var(--accent-soft); color:var(--accent); font-size:13.5px; font-weight:700;
  }
  .chip-btn:active{opacity:.7;}
  .home-body{flex:1; overflow-y:auto; padding:6px 16px calc(110px + var(--sab)); -webkit-overflow-scrolling:touch;}

  .topic-row{
    display:flex; align-items:center; gap:2px; padding:10px 6px; border-radius:12px;
    font-weight:700; font-size:14.5px; cursor:pointer;
  }
  .topic-row:active{background:var(--field);}
  .topic-caret{width:24px; height:24px; display:flex; align-items:center; justify-content:center; color:var(--sub); transition:transform .18s;}
  .topic-caret.open{transform:rotate(90deg);}
  .topic-ficon{color:var(--sub); margin-right:8px;}
  .topic-name{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .topic-cnt{font-size:11.5px; color:var(--sub); font-weight:600; margin-left:7px;}
  .topic-btns{margin-left:auto; display:flex; gap:2px; flex:0 0 auto;}
  .topic-btns button{
    width:32px; height:32px; border-radius:9px; display:flex; align-items:center; justify-content:center;
    color:var(--sub);
  }
  .topic-btns button:active{background:var(--field);}
  .tree-indent{margin-left:12px; border-left:1.5px solid var(--line); padding-left:10px;}

  .map-card{
    background:var(--panel); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow);
    padding:14px 15px; margin:6px 0; display:flex; align-items:center; gap:13px; cursor:pointer;
    transition:transform .12s;
  }
  .map-card:active{transform:scale(.98);}
  .mc-icon{
    width:42px; height:42px; border-radius:13px; display:flex; align-items:center; justify-content:center;
    flex:0 0 42px;
  }
  .mc-icon.trip{background:var(--accent-soft); color:var(--accent);}
  .mc-icon.idea{background:rgba(16,185,129,.13); color:#10b981;}
  .mc-main{flex:1; min-width:0;}
  .mc-title{font-size:15px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .mc-sub{font-size:12px; color:var(--sub); margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:500;}
  .mc-btn{
    width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center;
    color:var(--sub); flex:0 0 auto;
  }
  .mc-btn:active{background:var(--field);}
  .home-empty{text-align:center; color:var(--sub); padding:64px 20px; font-size:14px; line-height:1.9; font-weight:500;}
  .home-empty .e-icon{
    width:72px; height:72px; border-radius:24px; background:var(--accent-soft); color:var(--accent);
    display:flex; align-items:center; justify-content:center; margin:0 auto 16px;
  }
  .fab{
    position:absolute; right:20px; bottom:calc(24px + var(--sab)); width:58px; height:58px;
    border-radius:20px; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 24px rgba(91,91,214,.4); transition:transform .12s; z-index:20;
  }
  .fab:active{transform:scale(.92);}

  /* ═══ 맵 화면 ═══ */
  .top-bar{
    padding:calc(8px + var(--sat)) 10px 8px; display:flex; align-items:center; gap:4px;
    background:var(--panel); border-bottom:1px solid var(--line); z-index:10;
  }
  .tb-title{flex:1; font-size:15.5px; font-weight:700; text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding:0 4px;}
  #canvasWrap{
    flex:1; position:relative; overflow:hidden; touch-action:none;
    background-image:radial-gradient(circle, var(--dot) 1.2px, transparent 1.2px); background-size:26px 26px;
  }
  #mmSvg{width:100%; height:100%; display:block; touch-action:none;}
  .mm-node{cursor:pointer;}
  .zoom-ctl{
    position:absolute; top:12px; right:12px; display:flex; flex-direction:column; z-index:5;
    background:var(--panel); border:1px solid var(--line); border-radius:13px; box-shadow:var(--shadow);
    overflow:hidden;
  }
  .zoom-ctl button{
    width:40px; height:38px; display:flex; align-items:center; justify-content:center; color:var(--sub);
  }
  .zoom-ctl button:active{background:var(--field); color:var(--text);}
  .mm-hint{
    position:absolute; top:14px; left:50%; transform:translateX(-50%); z-index:5;
    font-size:11.5px; color:var(--sub); background:var(--panel); border:1px solid var(--line);
    padding:7px 15px; border-radius:20px; pointer-events:none; white-space:nowrap; transition:opacity .5s;
    box-shadow:var(--shadow); font-weight:500;
  }
  .sel-bar{
    position:absolute; left:12px; right:12px; bottom:calc(14px + var(--sab)); z-index:15;
    display:none; gap:4px; padding:7px; background:var(--panel); border:1px solid var(--line);
    border-radius:17px; box-shadow:var(--shadow-lg);
    overflow-x:auto; -webkit-overflow-scrolling:touch;
  }
  .sel-bar.show{display:flex; animation:sheetUp .25s cubic-bezier(.2,.9,.3,1);}
  .sel-bar button{
    flex:0 0 auto; display:flex; align-items:center; gap:6px; padding:10px 13px; border-radius:11px;
    font-size:13px; font-weight:700; white-space:nowrap; color:var(--text);
  }
  .sel-bar button:active{background:var(--field);}
  .sel-bar button svg{color:var(--sub);}
  .sel-bar button.danger{color:var(--danger);}
  .sel-bar button.danger svg{color:var(--danger);}

  /* ═══ 바텀 시트 ═══ */
  .backdrop{position:absolute; inset:0; background:rgba(10,11,15,.45); z-index:40; display:none;}
  .backdrop.show{display:block; animation:fadeIn .22s;}
  .sheet{
    position:absolute; left:0; right:0; bottom:0; z-index:50; background:var(--panel);
    border-radius:24px 24px 0 0; box-shadow:var(--shadow-lg);
    padding:10px 20px calc(20px + var(--sab)); display:none; max-height:88%;
    flex-direction:column;
  }
  .sheet.show{display:flex; animation:sheetUp .32s cubic-bezier(.2,.9,.3,1);}
  @keyframes sheetUp{from{transform:translateY(48px); opacity:0} to{transform:none; opacity:1}}
  @keyframes fadeIn{from{opacity:0} to{opacity:1}}
  .sheet-grip{width:36px; height:4px; border-radius:4px; background:var(--line); margin:4px auto 14px; flex:0 0 auto;}
  .sheet h3{font-size:17px; font-weight:800; margin-bottom:16px; flex:0 0 auto; letter-spacing:-.02em;}
  .sheet-body{overflow-y:auto; -webkit-overflow-scrolling:touch; flex:1;}
  .field{margin-bottom:12px;}
  .field label{display:block; font-size:12px; font-weight:700; color:var(--sub); margin-bottom:6px;}
  .field-row{display:flex; gap:8px;}
  .field-row .field{flex:1;}
  .sheet-btns{display:flex; gap:8px; margin-top:8px; flex:0 0 auto;}
  .primary-btn{
    flex:1; background:var(--accent); color:#fff; font-size:15px; font-weight:700;
    padding:14px; border-radius:14px; transition:transform .1s;
  }
  .primary-btn:active{transform:scale(.98); filter:brightness(1.1);}
  .danger-btn{
    background:var(--danger-soft); color:var(--danger); font-weight:700; padding:14px 16px; border-radius:14px;
    display:flex; align-items:center; justify-content:center;
  }
  .plain-btn{background:var(--field); font-weight:700; padding:14px 18px; border-radius:14px;}
  .convert-btn{
    width:100%; display:flex; align-items:center; justify-content:center; gap:8px;
    padding:13px; border-radius:13px; background:var(--accent-soft); color:var(--accent);
    font-size:14px; font-weight:800; margin-bottom:14px;
  }
  .convert-btn:active{opacity:.7;}
  .color-row{display:flex; gap:10px; flex-wrap:wrap; padding:2px 0;}
  .color-dot{width:32px; height:32px; border-radius:50%; border:none; position:relative; transition:transform .12s;}
  .color-dot.on{transform:scale(1.15); box-shadow:0 0 0 2.5px var(--panel), 0 0 0 4.5px var(--text);}
  .set-item{
    display:flex; align-items:center; gap:14px; width:100%; padding:15px 4px;
    border-bottom:1px solid var(--line); font-size:15px; font-weight:600; text-align:left;
  }
  .set-item .si-icon{
    width:40px; height:40px; border-radius:12px; background:var(--field); color:var(--sub);
    display:flex; align-items:center; justify-content:center;
  }
  .set-item .si-desc{display:block; font-size:11.5px; color:var(--sub); font-weight:500; margin-top:3px;}
  .set-note{font-size:12px; color:var(--sub); line-height:1.7; padding:16px 4px 4px; font-weight:500;}

  /* ═══ 일정표 ═══ */
  .itin-head{margin-bottom:8px; flex:0 0 auto;}
  .itin-head .ih-meta{font-size:12.5px; color:var(--sub); margin-top:5px; font-weight:500;}
  .itin-total{
    background:var(--accent-soft); color:var(--accent); font-weight:800; font-size:14px;
    padding:13px 16px; border-radius:14px; margin:12px 0 4px; display:flex; justify-content:space-between;
  }
  .itin-day{margin-top:20px;}
  .itin-day-head{display:flex; align-items:baseline; gap:8px; font-size:14.5px; font-weight:800; margin-bottom:9px; padding:0 2px;}
  .itin-day-head .id-sum{margin-left:auto; font-size:12px; color:var(--sub); font-weight:600;}
  .itin-item{
    display:flex; gap:12px; padding:12px 14px; border-radius:14px;
    margin-bottom:6px; background:var(--field); align-items:flex-start; cursor:pointer;
  }
  .itin-item:active{background:var(--accent-soft);}
  .ii-time{flex:0 0 44px; font-size:13px; font-weight:800; color:var(--accent); padding-top:2px; font-variant-numeric:tabular-nums;}
  .ii-main{flex:1; min-width:0;}
  .ii-title{font-size:14.5px; font-weight:600; display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .ii-memo{font-size:12.5px; color:var(--sub); margin-top:4px; white-space:pre-wrap; line-height:1.5; font-weight:500;}
  .ii-cost{font-size:12px; color:var(--sub); font-weight:700; margin-top:4px; font-variant-numeric:tabular-nums;}
  .cat-badge{display:inline-flex; align-items:center; gap:5px; font-size:11px; color:var(--sub); font-weight:700;}
  .cat-badge i{width:7px; height:7px; border-radius:50%;}
  .itin-add{
    width:100%; display:flex; align-items:center; justify-content:center; gap:6px;
    padding:12px; border:1.5px dashed var(--line); border-radius:14px; color:var(--sub);
    font-size:13px; font-weight:700; margin-top:2px;
  }
  .itin-add:active{background:var(--field);}
  .itin-empty{font-size:13px; color:var(--sub); padding:6px 4px 4px; font-weight:500;}
</style>
</head>
<body>

<!-- ═══════════ 홈 ═══════════ -->
<div class="screen" id="scrHome">
  <div class="home-head">
    <h1 class="logo">Mind<span>Trip</span></h1>
    <button class="icon-btn" id="btnSettings" onclick="openSheet('setSheet')"></button>
  </div>
  <div class="search-row">
    <div class="search-box">
      <span id="searchIc"></span>
      <input id="searchInput" type="search" placeholder="주제·마인드맵 검색">
    </div>
    <button class="chip-btn" id="btnAddTopic" onclick="addTopic(null)"></button>
  </div>
  <div class="home-body" id="homeBody"></div>
  <button class="fab" id="btnNewMap" onclick="openNewMapSheet()"></button>
</div>

<!-- ═══════════ 맵 캔버스 ═══════════ -->
<div class="screen" id="scrMap">
  <div class="top-bar">
    <button class="icon-btn" id="btnBack" onclick="goHome()"></button>
    <div class="tb-title" id="tbTitle"></div>
    <button class="icon-btn" id="btnLayout" onclick="autoLayout()" title="자동 정돈"></button>
    <button class="icon-btn" id="btnItin" onclick="openItin()" title="일정표"></button>
  </div>
  <div id="canvasWrap">
    <svg id="mmSvg"><g id="world"></g></svg>
    <div class="mm-hint" id="mmHint">탭: 선택 · 두 번 탭: 편집 · 두 손가락: 확대/축소</div>
    <div class="zoom-ctl">
      <button id="btnZoomIn" onclick="zoomBy(1.25)"></button>
      <button id="btnZoomFit" onclick="zoomFit()"></button>
      <button id="btnZoomOut" onclick="zoomBy(0.8)"></button>
    </div>
    <div class="sel-bar" id="selBar"></div>
  </div>
</div>

<!-- ═══════════ 시트 & 백드롭 ═══════════ -->
<div class="backdrop" id="backdrop" onclick="closeSheets()"></div>

<!-- 새 마인드맵 -->
<div class="sheet" id="mapSheet">
  <div class="sheet-grip"></div>
  <h3>새 마인드맵</h3>
  <form onsubmit="return createMap(this)">
    <div class="field"><label>이름</label><input name="name" placeholder="예: 이직 고민, 오사카 여행" required></div>
    <div class="field"><label>주제 위치</label><select name="topic" id="newMapTopic"></select></div>
    <div class="sheet-btns">
      <button type="button" class="plain-btn" onclick="closeSheets()">취소</button>
      <button type="submit" class="primary-btn">만들기</button>
    </div>
  </form>
</div>

<!-- 맵 설정 -->
<div class="sheet" id="mapSetSheet">
  <div class="sheet-grip"></div>
  <h3>마인드맵 설정</h3>
  <form onsubmit="return saveMapSettings(this)">
    <div class="field"><label>이름</label><input name="name" required></div>
    <div class="field"><label>주제</label><select name="topic" id="mapSetTopic"></select></div>
    <div class="sheet-btns">
      <button type="button" class="danger-btn" id="mapSetDel" onclick="deleteMapFromSheet()"></button>
      <button type="button" class="plain-btn" onclick="closeSheets()">닫기</button>
      <button type="submit" class="primary-btn">저장</button>
    </div>
  </form>
</div>

<!-- 여행계획으로 변환 -->
<div class="sheet" id="convertSheet">
  <div class="sheet-grip"></div>
  <h3>여행계획으로 변환</h3>
  <form onsubmit="return doConvert(this)">
    <div class="field"><label>목적지</label><input name="dest" placeholder="예: 일본 오사카"></div>
    <div class="field-row">
      <div class="field"><label>시작일</label><input name="start" type="date" required></div>
      <div class="field"><label>종료일</label><input name="end" type="date" required></div>
    </div>
    <div class="set-note" style="padding-top:0">이 마인드맵에 날짜별 Day 가지가 추가되고, 시간·비용·분류가 있는 일정 노드와 일정표 보기를 쓸 수 있게 됩니다. 기존 노드는 그대로 유지돼요.</div>
    <div class="sheet-btns">
      <button type="button" class="plain-btn" onclick="closeSheets()">취소</button>
      <button type="submit" class="primary-btn">변환하기</button>
    </div>
  </form>
</div>

<!-- 노드 편집 -->
<div class="sheet" id="editSheet">
  <div class="sheet-grip"></div>
  <h3 id="editTitle">노드 편집</h3>
  <div class="sheet-body"><form id="editForm"></form></div>
  <div class="sheet-btns" id="editBtns"></div>
</div>

<!-- 일정표 -->
<div class="sheet" id="itinSheet" style="height:88%">
  <div class="sheet-grip"></div>
  <div class="sheet-body" id="itinBody"></div>
  <div class="sheet-btns"><button class="plain-btn" style="flex:1" onclick="closeSheets()">닫기</button></div>
</div>

<!-- 설정 -->
<div class="sheet" id="setSheet">
  <div class="sheet-grip"></div>
  <h3>설정</h3>
  <div class="sheet-body">
    <button class="set-item" onclick="exportData()">
      <span class="si-icon" id="icExport"></span>
      <span>백업하기<span class="si-desc">모든 마인드맵을 JSON 파일로 저장합니다</span></span>
    </button>
    <button class="set-item" onclick="importFile.click()">
      <span class="si-icon" id="icImport"></span>
      <span>복원하기<span class="si-desc">백업 파일을 불러옵니다 (현재 데이터를 덮어씁니다)</span></span>
    </button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">
    <div class="set-note">
      데이터는 이 기기(브라우저)에만 저장됩니다. 기기를 바꾸거나 브라우저 데이터를 지우면 사라질 수 있으니, 중요한 내용은 백업해 두세요.
    </div>
  </div>
  <div class="sheet-btns"><button class="plain-btn" style="flex:1" onclick="closeSheets()">닫기</button></div>
</div>

<script>
'use strict';
/* ════════════════ 아이콘 ════════════════ */
const I = {
  plus:'<path d="M12 5v14M5 12h14"/>',
  search:'<circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/>',
  gear:'<circle cx="12" cy="12" r="3.2"/><path d="M19.2 12a7.2 7.2 0 0 0-.1-1.2l2-1.5-2-3.5-2.4 1a7.3 7.3 0 0 0-2-1.2L14.3 3h-4l-.4 2.6a7.3 7.3 0 0 0-2 1.2l-2.4-1-2 3.5 2 1.5a7.2 7.2 0 0 0 0 2.4l-2 1.5 2 3.5 2.4-1a7.3 7.3 0 0 0 2 1.2l.4 2.6h4l.4-2.6a7.3 7.3 0 0 0 2-1.2l2.4 1 2-3.5-2-1.5c.06-.4.1-.8.1-1.2Z"/>',

/* ════════════════ 공통 ════════════════ */
const LS_KEY = 'mindtrip-v2';
const PALETTE = ['#5b5bd6','#10b981','#f59e0b','#e5484d','#8b5cf6','#0ea5e9','#ec4899','#64748b'];
const CATS = {
  move:{label:'이동',emoji:'🚗',fg:'#0ea5e9'},
  food:{label:'식사',emoji:'🍽️',fg:'#f59e0b'},
  sight:{label:'관광',emoji:'📸',fg:'#10b981'},
  stay:{label:'숙소',emoji:'🏨',fg:'#8b5cf6'},
  shop:{label:'쇼핑',emoji:'🛍️',fg:'#ec4899'},
  etc:{label:'기타',emoji:'📌',fg:'#64748b'},
};
const DAY_NAMES = ['일','월','화','수','목','금','토'];
const uid = () => Math.random().toString(36).slice(2,8) + Date.now().toString(36).slice(-4);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const toYMD = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
function fmtShort(ds){
  if(!ds) return '';
  const d = new Date(ds + 'T00:00:00');
  if(isNaN(d)) return ds;
  return `${d.getMonth()+1}/${d.getDate()}(${DAY_NAMES[d.getDay()]})`;
}
const fmtWon = n => Number(n||0).toLocaleString('ko-KR') + '원';
const themeC = () => {
  const s = getComputedStyle(document.body);
  return {
    panel: s.getPropertyValue('--panel').trim(),
    text: s.getPropertyValue('--text').trim(),
    line: s.getPropertyValue('--line').trim(),
    sub: s.getPropertyValue('--sub').trim(),
  };
};

let storageOK = true;
function save(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
  catch(e){ storageOK = false; }
}
function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){ storageOK = false; }
  return null;
}

let state = normalize(load() || seedState());
let curMapId = null;
let sel = null;
let searchQ = '';

function normalize(s){
  if(!Array.isArray(s.topics)) s.topics = [];
  if(!Array.isArray(s.maps)) s.maps = [];
  s.maps.forEach(m => { if(m.topicId === undefined) m.topicId = null; });
  return s;
}
function seedState(){
  const today = new Date();
  const d1 = toYMD(today);
  const t2 = new Date(today); t2.setDate(t2.getDate()+1);
  const d2 = toYMD(t2);
  const topicId = uid();
  const rid = uid(), day1 = uid(), day2 = uid(), i1 = uid(), i2 = uid(), i3 = uid();
  const trip = {
    id: uid(), kind:'trip', name:'예시: 서울 여행', topicId, dest:'서울', start:d1, end:d2,
    cam:{x:0,y:0,z:1}, rootId:rid,
    nodes:{
      [rid]:{id:rid,parentId:null,type:'root',text:'예시: 서울 여행',color:PALETTE[0],x:0,y:0,meta:{}},
      [day1]:{id:day1,parentId:rid,type:'day',text:'',color:PALETTE[1],x:260,y:-80,meta:{date:d1}},
      [day2]:{id:day2,parentId:rid,type:'day',text:'',color:PALETTE[2],x:260,y:80,meta:{date:d2}},
      [i1]:{id:i1,parentId:day1,type:'item',text:'경복궁 구경',color:PALETTE[1],x:540,y:-120,meta:{time:'10:00',cat:'sight',cost:3000,memo:'한복 입으면 무료'}},
      [i2]:{id:i2,parentId:day1,type:'item',text:'광장시장 점심',color:PALETTE[1],x:540,y:-50,meta:{time:'12:30',cat:'food',cost:15000,memo:''}},
      [i3]:{id:i3,parentId:day2,type:'item',text:'남산타워',color:PALETTE[2],x:540,y:80,meta:{time:'11:00',cat:'sight',cost:16000,memo:''}},
    }
  };
  return {topics:[{id:topicId, name:'여행', parentId:null, open:true}], maps:[trip]};
}

const curMap = () => state.maps.find(m => m.id === curMapId) || null;
function childrenOf(map, id){
  const ch = Object.values(map.nodes).filter(n => n.parentId === id);
  ch.sort((a,b) => {
    if(a.type === 'day' && b.type === 'day') return (a.meta.date||'').localeCompare(b.meta.date||'');
    if(a.type === 'item' && b.type === 'item') return (a.meta.time||'99:99').localeCompare(b.meta.time||'99:99');
    if(a.type === 'day' && b.type !== 'day') return -1;
    if(b.type === 'day' && a.type !== 'day') return 1;
    return 0;
  });
  return ch;
}
function dayIndexOf(map, n){
  const days = childrenOf(map, map.rootId).filter(x => x.type === 'day');
  return days.findIndex(d => d.id === n.id) + 1;
}
function nodeLabel(map, n){
  if(n.type === 'day'){
    const i = dayIndexOf(map, n);
    return `Day ${i > 0 ? i : '?'} · ${fmtShort(n.meta.date)}${n.text ? ' ' + n.text : ''}`;
  }
  if(n.type === 'item'){
    return `${n.meta.time ? n.meta.time + '  ' : ''}${n.text}`;
  }
  return n.text || ' ';
}
function tripTotal(m){
  return Object.values(m.nodes).reduce((s,n) => s + (n.type==='item' ? Number(n.meta.cost)||0 : 0), 0);
}

/* ════════════════ 주제(폴더) 트리 ════════════════ */
const topicChildren = pid => state.topics.filter(t => (t.parentId||null) === pid);
const mapsIn = tid => state.maps.filter(m => (m.topicId||null) === tid);
function topicById(id){ return state.topics.find(t => t.id === id) || null; }
function topicPath(tid){
  const parts = [];
  let t = topicById(tid);
  let guard = 0;
  while(t && guard++ < 20){ parts.unshift(t.name); t = topicById(t.parentId); }
  return parts.join(' / ');
}
function countMapsDeep(tid){
  let n = mapsIn(tid).length;
  topicChildren(tid).forEach(c => n += countMapsDeep(c.id));
  return n;
}
function addTopic(parentId){
  const name = prompt(parentId ? '하위 주제 이름' : '새 주제 이름', '');
  if(!name || !name.trim()) return;
  state.topics.push({id:uid(), name:name.trim(), parentId:parentId||null, open:true});
  const p = topicById(parentId);
  if(p) p.open = true;
  save(); renderHome();
}
function renameTopic(id){
  const t = topicById(id); if(!t) return;
  const name = prompt('주제 이름', t.name);
  if(name && name.trim()){ t.name = name.trim(); save(); renderHome(); }
}
function deleteTopic(id){
  const t = topicById(id); if(!t) return;
  const cnt = countMapsDeep(id);
  if(!confirm(`주제 "${t.name}"을(를) 삭제할까요?${cnt ? `\n(포함된 마인드맵 ${cnt}개는 상위로 이동합니다)` : ''}`)) return;
  state.topics.forEach(c => { if(c.parentId === id) c.parentId = t.parentId; });
  state.maps.forEach(m => { if(m.topicId === id) m.topicId = t.parentId; });
  state.topics = state.topics.filter(x => x.id !== id);
  save(); renderHome();
}
function topicOptions(selectedId){
  let out = `<option value="">분류 없음</option>`;
  const walk = (pid, depth) => {
    topicChildren(pid).forEach(t => {
      out += `<option value="${t.id}" ${t.id === selectedId ? 'selected' : ''}>${'　'.repeat(depth)}${esc(t.name)}</option>`;
      walk(t.id, depth+1);
    });
  };
  walk(null, 0);
  return out;
}

/* ════════════════ 화면 전환 ════════════════ */
function show(scr){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(scr).classList.add('active');
}
function goHome(){ curMapId = null; sel = null; closeSheets(); renderHome(); show('scrHome'); }
function openMap(id){
  curMapId = id; sel = null;
  show('scrMap');
  const map = curMap();
  document.getElementById('tbTitle').textContent = map.name;
  document.getElementById('btnItin').style.display = map.kind === 'trip' ? '' : 'none';

}

/* ════════════════ 홈 렌더 ════════════════ */
function mapCard(m, showPath){
  const cnt = Object.keys(m.nodes).length - 1;
  const sub = m.kind === 'trip'
    ? `${m.dest ? esc(m.dest) + ' · ' : ''}${fmtShort(m.start)} ~ ${fmtShort(m.end)} · ${fmtWon(tripTotal(m))}`
    : `노드 ${cnt}개`;
  const path = showPath && m.topicId ? `${esc(topicPath(m.topicId))} · ` : '';
  return `<div class="map-card" data-mapid="${m.id}">
    <div class="mc-icon ${m.kind==='trip'?'trip':'idea'}">${ic(m.kind==='trip'?'send':'network', 20)}</div>
    <div class="mc-main"><div class="mc-title">${esc(m.name)}</div><div class="mc-sub">${path}${sub}</div></div>
    <button class="mc-btn" data-act="settings">${ic('dots',18)}</button>
  </div>`;
}
function renderHome(){
  const box = document.getElementById('homeBody');
  let html = '';
  const q = searchQ.trim().toLowerCase();

  if(q){
    const hits = state.maps.filter(m =>
      m.name.toLowerCase().includes(q) ||
      (m.topicId && topicPath(m.topicId).toLowerCase().includes(q))
    );
    html = `<div class="topic-row" style="cursor:default"><span class="topic-name">검색 결과</span><span class="topic-cnt">${hits.length}</span></div>`;
    html += hits.length ? hits.map(m => mapCard(m, true)).join('')
      : '<div class="home-empty" style="padding:36px">검색 결과가 없어요</div>';
  }else if(!state.maps.length && !state.topics.length){
    html = `<div class="home-empty">
      <span class="e-icon">${ic('network', 32)}</span>
      아직 마인드맵이 없어요.<br>오른쪽 아래 버튼으로 첫 마인드맵을 만들어 보세요.<br>
      <span style="font-size:12px">중심 주제 설정에서 여행계획으로 변환할 수 있어요</span></div>`;
  }else{
    const renderTopicTree = (t) => {
      const kids = topicChildren(t.id);
      const maps = mapsIn(t.id);
      const cnt = countMapsDeep(t.id);
      let h = `<div class="topic-row" data-topic="${t.id}">
        <span class="topic-caret ${t.open?'open':''}">${ic('chev',15,2.2)}</span>
        <span class="topic-ficon">${ic('folder',18)}</span>
        <span class="topic-name">${esc(t.name)}</span><span class="topic-cnt">${cnt}</span>
        <span class="topic-btns">
          <button data-tact="add" title="하위 주제">${ic('plus',16,2)}</button>
          <button data-tact="rename" title="이름 변경">${ic('edit',15)}</button>
          <button data-tact="del" title="삭제">${ic('trash',15)}</button>
        </span>
      </div>`;
      if(t.open){
        const inner = kids.map(renderTopicTree).join('') + maps.map(m => mapCard(m)).join('');
        if(inner) h += `<div class="tree-indent">${inner}</div>`;
      }
      return h;
    };
    html = topicChildren(null).map(renderTopicTree).join('');
    const loose = mapsIn(null);
    if(loose.length){
      if(state.topics.length) html += `<div class="topic-row" style="cursor:default"><span class="topic-name" style="color:var(--sub)">분류 없음</span><span class="topic-cnt">${loose.length}</span></div>`;
      html += loose.map(m => mapCard(m)).join('');
    }
  }
  if(!storageOK) html += `<div class="home-empty" style="padding:14px;color:var(--danger)">이 브라우저에서는 자동 저장이 안 됩니다. 설정에서 백업을 활용하세요.</div>`;
  box.innerHTML = html;

  box.querySelectorAll('.topic-row[data-topic]').forEach(el => {
    const id = el.dataset.topic;
    el.addEventListener('click', e => {
      const actBtn = e.target.closest('[data-tact]');
      if(actBtn){
        e.stopPropagation();
        const act = actBtn.dataset.tact;
        if(act === 'add') addTopic(id);
        else if(act === 'rename') renameTopic(id);
        else if(act === 'del') deleteTopic(id);
        return;
      }
      const t = topicById(id);
      if(t){ t.open = !t.open; save(); renderHome(); }
    });
  });
  box.querySelectorAll('.map-card').forEach(el => {
    el.addEventListener('click', e => {
      const id = el.dataset.mapid;
      if(e.target.closest('[data-act="settings"]')){
        e.stopPropagation(); openMapSettings(id); return;
      }
      openMap(id);
    });
  });
}
document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value;
  renderHome();
});

/* ════════════════ 맵 생성/설정 ════════════════ */
function openNewMapSheet(){
  document.getElementById('newMapTopic').innerHTML = topicOptions(null);
  openSheet('mapSheet');
}
function createMap(form){
  const f = new FormData(form);
  const name = String(f.get('name')).trim() || '새 마인드맵';
  const rid = uid();
  const map = {
    id: uid(), kind:'idea', name, topicId: f.get('topic') || null,

    nodes:{[rid]:{id:rid,parentId:null,type:'root',text:name,color:PALETTE[0],x:0,y:0,meta:{}}}
  };
  state.maps.push(map);
  const t = topicById(map.topicId);
  if(t) t.open = true;
  save(); form.reset(); closeSheets(); openMap(map.id);

let settingsMapId = null;
function openMapSettings(id){
  const m = state.maps.find(x => x.id === id); if(!m) return;
  settingsMapId = id;
  const sheet = document.getElementById('mapSetSheet');
  sheet.querySelector('input[name=name]').value = m.name;
  document.getElementById('mapSetTopic').innerHTML = topicOptions(m.topicId);

}
function saveMapSettings(form){
  const m = state.maps.find(x => x.id === settingsMapId); if(!m) return false;
  const f = new FormData(form);
  m.name = String(f.get('name')).trim() || m.name;
  m.topicId = f.get('topic') || null;
  if(m.nodes[m.rootId]) m.nodes[m.rootId].text = m.name;
  save(); closeSheets(); renderHome();
  return false;
}
function deleteMapFromSheet(){
  const m = state.maps.find(x => x.id === settingsMapId); if(!m) return;
  if(!confirm(`"${m.name}"을(를) 삭제할까요?`)) return;
  state.maps = state.maps.filter(x => x.id !== settingsMapId);
  save(); closeSheets(); renderHome();
}

/* ════════════════ 여행계획으로 변환 ════════════════ */
function doConvert(form){
  const map = curMap(); if(!map) return false;
  const f = new FormData(form);
  const start = f.get('start'), end = f.get('end');
  if(end < start){ alert('종료일이 시작일보다 빠릅니다.'); return false; }
  map.kind = 'trip';
  map.dest = String(f.get('dest')||'').trim();
  map.start = start; map.end = end;
  const s = new Date(start+'T00:00:00'), e = new Date(end+'T00:00:00');
  let i = 0;
  for(let d = new Date(s); d <= e && i < 90; d.setDate(d.getDate()+1), i++){
    const nid = uid();
    map.nodes[nid] = {id:nid, parentId:map.rootId, type:'day', text:'', color:PALETTE[(i+1)%PALETTE.length], x:0, y:0, meta:{date:toYMD(d)}};
  }
  save(); form.reset(); closeSheets();
  document.getElementById('btnItin').style.display = '';
  autoLayout();
  return false;
}

/* ════════════════ 캔버스 렌더 ════════════════ */
const SVGNS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('mmSvg');
const world = document.getElementById('world');
const wrap = document.getElementById('canvasWrap');
const mctx = document.createElement('canvas').getContext('2d');

function nodeSize(map, n){
  const isRoot = n.type === 'root';
  mctx.font = (isRoot ? '700 15px ' : '600 13.5px ') + '-apple-system, Segoe UI, sans-serif';
  const tw = mctx.measureText(nodeLabel(map, n)).width;
  const pad = (n.type === 'item' || n.type === 'idea') ? 48 : 36;
  const w = Math.max(isRoot ? 110 : 78, tw + pad);
  return {w: Math.min(w, 320), h: isRoot ? 48 : 40};
}
function camTransform(map){
  const r = wrap.getBoundingClientRect();
  return `translate(${r.width/2 + map.cam.x},${r.height/2 + map.cam.y}) scale(${map.cam.z})`;
}
function applyCam(){ const m = curMap(); if(m) world.setAttribute('transform', camTransform(m)); }

function renderMap(){
  const map = curMap();
  world.innerHTML = '';
  if(!map) return;
  const C = themeC();
  applyCam();
  for(const n of Object.values(map.nodes)){
    if(!n.parentId || !map.nodes[n.parentId]) continue;
    const p = map.nodes[n.parentId];
    const path = document.createElementNS(SVGNS,'path');
    const mx = (p.x + n.x)/2;
    path.setAttribute('d', `M ${p.x} ${p.y} C ${mx} ${p.y}, ${mx} ${n.y}, ${n.x} ${n.y}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke', C.line);
    path.setAttribute('stroke-width', 2);
    world.appendChild(path);
  }
  for(const n of Object.values(map.nodes)){
    const isRoot = n.type === 'root';
    const {w,h} = nodeSize(map, n);
    const g = document.createElementNS(SVGNS,'g');
    g.setAttribute('class','mm-node');
    g.setAttribute('transform',`translate(${n.x},${n.y})`);
    g.dataset.id = n.id;

    const rect = document.createElementNS(SVGNS,'rect');
    rect.setAttribute('x',-w/2); rect.setAttribute('y',-h/2);
    rect.setAttribute('width',w); rect.setAttribute('height',h);
    rect.setAttribute('rx', isRoot ? 15 : 12);
    if(isRoot){
      rect.setAttribute('fill', n.color);
      rect.setAttribute('stroke', n.id === sel ? C.text : 'none');

    text.textContent = label;
    g.appendChild(text);
    world.appendChild(g);
  }
}

/* ════════════════ 좌표/줌 ════════════════ */
function screenToWorld(sx, sy){
  const map = curMap(), r = wrap.getBoundingClientRect();
  return {x:(sx-r.left-r.width/2-map.cam.x)/map.cam.z, y:(sy-r.top-r.height/2-map.cam.y)/map.cam.z};
}
function applyZoom(factor, cx, cy){
  const map = curMap(); if(!map) return;
  const r = wrap.getBoundingClientRect();
  const z2 = Math.min(2.5, Math.max(0.15, map.cam.z*factor));
  const f = z2/map.cam.z;
  const px = (cx ?? r.left+r.width/2)-r.left-r.width/2;
  const py = (cy ?? r.top+r.height/2)-r.top-r.height/2;
  map.cam.x = px-(px-map.cam.x)*f;
  map.cam.y = py-(py-map.cam.y)*f;
  map.cam.z = z2;
  applyCam(); save();
}
function zoomBy(f){ applyZoom(f); }
function zoomFit(){
  const map = curMap(); if(!map) return;
  const ns = Object.values(map.nodes); if(!ns.length) return;
  const r = wrap.getBoundingClientRect();
  let minX=1/0, maxX=-1/0, minY=1/0, maxY=-1/0;
  ns.forEach(n => {
    const {w,h} = nodeSize(map,n);
    minX=Math.min(minX,n.x-w/2); maxX=Math.max(maxX,n.x+w/2);
    minY=Math.min(minY,n.y-h/2); maxY=Math.max(maxY,n.y+h/2);
  });
  const bw = maxX-minX+140, bh = maxY-minY+140;
  const z = Math.min(1.6, Math.max(0.15, Math.min(r.width/bw, r.height/bh)));
  map.cam.z = z;
  map.cam.x = -((minX+maxX)/2)*z;
  map.cam.y = -((minY+maxY)/2)*z;
  applyCam(); save();
}

/* ════════════════ 포인터(터치+마우스) ════════════════ */
const pointers = new Map();
let drag = null, pinch = null, lastTap = {t:0, id:null};

svg.addEventListener('pointerdown', e => {
  const map = curMap(); if(!map) return;
  svg.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if(pointers.size === 2){ drag = null; pinch = null; return; }
  const g = e.target.closest('.mm-node');
  if(g && map.nodes[g.dataset.id]){
    const n = map.nodes[g.dataset.id];
    const w = screenToWorld(e.clientX, e.clientY);
    drag = {type:'node', id:n.id, dx:n.x-w.x, dy:n.y-w.y, moved:false, sx:e.clientX, sy:e.clientY, t:Date.now()};
  }else{
    drag = {type:'pan', sx:e.clientX, sy:e.clientY, cx:map.cam.x, cy:map.cam.y, moved:false, t:Date.now()};
  }
});
svg.addEventListener('pointermove', e => {
  if(!pointers.has(e.pointerId)) return;
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  const map = curMap(); if(!map) return;
  if(pointers.size === 2){ doPinch(map); return; }
  if(!drag) return;
  const dx = e.clientX-drag.sx, dy = e.clientY-drag.sy;
  if(Math.hypot(dx,dy) > 7) drag.moved = true;
  if(!drag.moved) return;
  if(drag.type === 'node'){
    const n = map.nodes[drag.id]; if(!n) return;
    const w = screenToWorld(e.clientX, e.clientY);
    n.x = Math.round(w.x+drag.dx); n.y = Math.round(w.y+drag.dy);
    renderMap();
  }else{
    map.cam.x = drag.cx+dx; map.cam.y = drag.cy+dy;
    applyCam();
  }
});
function pinchInfo(){
  const [a,b] = [...pointers.values()];
  return {d:Math.hypot(a.x-b.x, a.y-b.y), mx:(a.x+b.x)/2, my:(a.y+b.y)/2};
}
function doPinch(map){
  const i = pinchInfo();
  if(!pinch){ pinch = {d0:i.d, mx0:i.mx, my0:i.my, z0:map.cam.z, cx0:map.cam.x, cy0:map.cam.y}; return; }
  const r = wrap.getBoundingClientRect();
  const z2 = Math.min(2.5, Math.max(0.15, pinch.z0 * i.d/(pinch.d0||1)));
  const px0 = pinch.mx0-r.left-r.width/2, py0 = pinch.my0-r.top-r.height/2;
  const wx = (px0-pinch.cx0)/pinch.z0, wy = (py0-pinch.cy0)/pinch.z0;
  const px = i.mx-r.left-r.width/2, py = i.my-r.top-r.height/2;
  map.cam.z = z2;
  map.cam.x = px-wx*z2;
  map.cam.y = py-wy*z2;
  applyCam();
}
function endPointer(e){
  if(!pointers.has(e.pointerId)) return;
  pointers.delete(e.pointerId);
  if(pointers.size < 2 && pinch){ pinch = null; save(); }
  if(!drag) return;
  const map = curMap();
  if(map && !drag.moved && Date.now()-drag.t < 700){
    if(drag.type === 'node'){
      const id = drag.id;
      if(lastTap.id === id && Date.now()-lastTap.t < 380){
        lastTap = {t:0, id:null};
        openEdit(id);
      }else{
        sel = id; lastTap = {t:Date.now(), id};
        renderMap(); renderSelBar();
      }
    }else{
      sel = null; lastTap = {t:0, id:null};
      renderMap(); renderSelBar();
    }
  }
  if(drag.moved) save();
  drag = null;
}
svg.addEventListener('pointerup', endPointer);
svg.addEventListener('pointercancel', endPointer);
svg.addEventListener('wheel', e => {
  e.preventDefault();
  applyZoom(e.deltaY < 0 ? 1.12 : 1/1.12, e.clientX, e.clientY);
}, {passive:false});
window.addEventListener('resize', () => { if(curMap()) renderMap(); });

/* ════════════════ 선택 툴바 ════════════════ */
function renderSelBar(){
  const bar = document.getElementById('selBar');
  const map = curMap();
  const n = map && sel ? map.nodes[sel] : null;
  if(!n){ bar.classList.remove('show'); return; }

  let html = btn('edit','편집','edit');
  if(map.kind === 'trip'){
    if(n.type === 'root') html += btn('cal','Day 추가','addDay');
    if(n.type === 'day') html += btn('plus','일정','addChild') + btn('cal','Day 추가','addDay');
    if(n.type === 'item') html += btn('plus','같은 날 일정','addSibling') + btn('plus','메모','addChild');
    if(n.type === 'idea') html += btn('plus','자식','addChild') + btn('plus','형제','addSibling');
  }else{
    html += btn('plus','자식','addChild');
    if(n.type !== 'root') html += btn('plus','형제','addSibling');
  }
  if(n.type !== 'root') html += btn('trash','삭제','del','danger');
  bar.innerHTML = html;
  bar.classList.add('show');
  bar.querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
    const fn = b.dataset.fn;
    if(fn === 'edit') openEdit(sel);
    else if(fn === 'addChild') addChild(sel);
    else if(fn === 'addSibling'){ const p = map.nodes[sel]; if(p && p.parentId) addChild(p.parentId); }
    else if(fn === 'addDay') addDay();
    else if(fn === 'del') deleteNode();
  }));
}

/* ════════════════ 노드 조작 ════════════════ */
function typeForChild(map, parent){
  if(map.kind !== 'trip') return 'idea';
  if(parent.type === 'root') return 'day';
  if(parent.type === 'day') return 'item';
  return 'idea';
}
function placeBelow(map, parent){
  const sib = Object.values(map.nodes).filter(n => n.parentId === parent.id);
  const x = parent.x + 260;
  const y = sib.length ? Math.max(...sib.map(s => s.y)) + 58 : parent.y;
  return {x, y};
}
function addChild(parentId){
  const map = curMap(); if(!map) return;
  const p = map.nodes[parentId]; if(!p) return;
  const type = typeForChild(map, p);
  if(type === 'day'){ addDay(); return; }
  const pos = placeBelow(map, p);
  const n = {
    id: uid(), parentId, type,
    text: type === 'item' ? '새 일정' : '새 노드',
    color: p.type === 'root' ? PALETTE[(Object.values(map.nodes).filter(x=>x.parentId===parentId).length+1)%PALETTE.length] : p.color,
    x: pos.x, y: pos.y,
    meta: type === 'item' ? {time:'', cat:'sight', cost:0, memo:''} : {}
  };
  map.nodes[n.id] = n;
  sel = n.id;
  save(); renderMap(); renderSelBar();
  openEdit(n.id);
}
function addDay(){
  const map = curMap(); if(!map || map.kind !== 'trip') return;
  const days = childrenOf(map, map.rootId).filter(n => n.type === 'day');
  let date = map.start;
  if(days.length){
    const last = days[days.length-1].meta.date;
    const d = new Date((last || map.start) + 'T00:00:00');
    d.setDate(d.getDate()+1);
    date = toYMD(d);
  }
  const p = map.nodes[map.rootId];
  const pos = placeBelow(map, p);
  const n = {
    id: uid(), parentId: map.rootId, type:'day', text:'',
    color: PALETTE[(days.length+1)%PALETTE.length],
    x: pos.x, y: pos.y, meta:{date}
  };
  map.nodes[n.id] = n;
  if(date > map.end) map.end = date;
  sel = n.id;
  save(); renderMap(); renderSelBar();
}
function deleteNode(){
  const map = curMap(); const n = map && map.nodes[sel]; if(!n) return;
  if(n.type === 'root'){ alert('중심 노드는 삭제할 수 없어요.'); return; }
  const toDel = [n.id];
  for(let i=0; i<toDel.length; i++)
    Object.values(map.nodes).forEach(c => { if(c.parentId === toDel[i]) toDel.push(c.id); });
  if(toDel.length > 1 && !confirm(`하위 노드 ${toDel.length-1}개도 함께 삭제됩니다. 계속할까요?`)) return;
  toDel.forEach(id => delete map.nodes[id]);
  sel = null;
  save(); renderMap(); renderSelBar(); closeSheets();
}

/* ════════════════ 자동 정돈 ════════════════ */
function autoLayout(){
  const map = curMap(); if(!map) return;
  const GX = 270, GAP = 16, MIN = 54;
  function h(id){
    const ch = childrenOf(map, id);
    if(!ch.length) return MIN;
    return Math.max(MIN, ch.reduce((s,c) => s + h(c.id), 0) + (ch.length-1)*GAP);
  }
  function place(id, x, top){
    const n = map.nodes[id];
    const H = h(id);
    n.x = x; n.y = Math.round(top + H/2);
    let ty = top;
    for(const c of childrenOf(map, id)){
      const cH = h(c.id);
      place(c.id, x + GX, ty);
      ty += cH + GAP;
    }
  }
  place(map.rootId, 0, -h(map.rootId)/2);
  save(); renderMap(); zoomFit();
}

function saveEdit(keepOpen){
  const map = curMap(); const n = map && map.nodes[editId]; if(!n) return;
  const form = document.getElementById('editForm');

  if(f.has('text')) n.text = String(f.get('text')).trim();

    n.meta.date = f.get('date') || n.meta.date;
    if(n.meta.date && map.end && n.meta.date > map.end) map.end = n.meta.date;
    if(n.meta.date && map.start && n.meta.date < map.start) map.start = n.meta.date;
  }
  if(n.type === 'item'){
    n.meta.time = f.get('time') || '';
    n.meta.cat = f.get('cat') || 'etc';
    n.meta.cost = Number(f.get('cost')) || 0;
    n.meta.memo = String(f.get('memo')||'').trim();

    map.name = n.text;
    if(map.kind === 'trip') map.dest = String(f.get('dest')||'').trim();

  if(on) n.color = on.dataset.col;
  save(); renderMap(); renderSelBar();
  if(!keepOpen) closeSheets();
}

function importData(input){
  const f = input.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    try{
      const d = JSON.parse(r.result);
      if(!Array.isArray(d.maps)) throw 0;
      state = normalize(d); save(); closeSheets(); renderHome();
      alert('복원 완료!');

    input.value = '';
  };
  r.readAsText(f);
}

/* ════════════════ 데스크톱 단축키 ════════════════ */
document.addEventListener('keydown', e => {
  if(!curMap() || !sel) return;
  if(document.activeElement && ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) return;
  const map = curMap(), n = map.nodes[sel];
  if(!n) return;
  if(e.key === 'Tab'){ e.preventDefault(); addChild(sel); }
  else if(e.key === 'Enter'){ e.preventDefault(); if(n.parentId) addChild(n.parentId); }
  else if(e.key === 'Delete' || e.key === 'Backspace'){ e.preventDefault(); deleteNode(); }
  else if(e.key === 'F2'){ e.preventDefault(); openEdit(sel); }
  else if(e.key === 'Escape'){ sel = null; renderMap(); renderSelBar(); }
});
